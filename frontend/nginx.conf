server {
    # Puerto 8080 para Cloud Run
    listen 8080;
    listen [::]:8080;
    
    server_name _;
    
    # Directorio raíz
    root /usr/share/nginx/html;
    
    # Archivo índice por defecto
    index index.html;
    
    # Configuración para Single Page Application (SPA)
    location / {
        # Si la ruta no existe, servir index.html
        try_files $uri $uri/ /index.html;
    }
    
    # Cache de archivos estáticos (CSS, JS, etc)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Configuración de gzip para comprimir respuestas
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
}
